name: Build & Deploy → gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: "!startsWith(github.event.head_commit.message, 'build: minified deploy')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build.js

      - name: Report sizes
        run: |
          echo "=== Build sizes ==="
          du -sh dist/app.js dist/products.js dist/styles.css dist/index.html
          echo "=== Total ==="
          du -sh dist/

      - name: Deploy to gh-pages
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: minified deploy from ${GITHUB_SHA:0:7} [skip ci]"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
