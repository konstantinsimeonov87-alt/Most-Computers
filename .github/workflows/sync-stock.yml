name: Sync Stock from Most BG XML

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync stock from XML feeds
        run: node scripts/sync-stock.js

      - name: Rebuild app.js if data changed
        run: |
          if git diff --quiet js/data.js; then
            echo "No stock changes — skipping rebuild."
            exit 0
          fi
          node build.js

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/data.js app.js dist/app.js dist/sw.js
          git commit -m "chore(stock): auto-sync nalichnosti $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
